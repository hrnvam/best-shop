<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="/dist/css/main.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"
    />
    <title>BEST SHOP</title>
  </head>
  <body>
    <header class="header" id="header-root"></header>

    <section class="contact-banner banner">
      <h1 class="contact-banner__title banner__title">Contact Us</h1>
      <p class="contact-banner__text banner__text">
        Duis vestibulum elit vel neque pharetra vulputate. Duis rutrum non risus
        in imperdiet.
      </p>
    </section>

    <main class="contact-main">
      <section class="contact__cards features" id="company-features"></section>
      <section class="contact-form-section">
        <div class="contact-form-section__left">
        </div>

        <div class="contact-form-section__content">
          <h2 class="contact-form-section__title">
            Your Feedback Is Much Appreciated!
          </h2>
          <p class="contact-form-section__subtitle">
            We will contact you when you complete the following form!
          </p>

          <div class="contact-form" id="contact-form-root"></div>
        </div>
      </section>
    </main>

    <div class="auth-modal" id="auth-modal" aria-hidden="true">
      <div class="auth-modal__backdrop" id="auth-modal-backdrop"></div>
      <div class="auth-card" role="dialog" aria-modal="true">
        <button
          class="auth-card__close"
          id="auth-modal-close"
          aria-label="Close"
        >
          <i class="fas fa-times"></i>
        </button>

        <div class="auth-tabs">
          <button
            class="auth-tabs__btn auth-tabs__btn--active"
            data-tab="login"
          >
            Log In
          </button>
          <button class="auth-tabs__btn" data-tab="register">Register</button>
        </div>

        <div class="auth-panel auth-panel--active" id="auth-panel-login">
          <div class="auth-field">
            <label class="auth-field__label"
              >Email address <span class="auth-field__required">*</span></label
            >
            <input class="auth-field__input" id="login-email" type="email" />
          </div>
          <div class="auth-field">
            <label class="auth-field__label"
              >Password <span class="auth-field__required">*</span></label
            >
            <div class="auth-field__input-wrap">
              <input
                class="auth-field__input"
                id="login-password"
                type="password"
              />
              <button class="auth-field__eye" id="login-eye" type="button">
                <i class="far fa-eye"></i>
              </button>
            </div>
          </div>
          <div class="auth-row">
            <label class="auth-check-label">
              <input
                type="checkbox"
                id="login-remember"
                class="auth-checkbox"
              />
              Remember me
            </label>
            <a href="#" class="auth-link">Forgot Your Password?</a>
          </div>
          <p class="auth-msg" id="login-msg"></p>
          <button class="auth-btn" id="login-submit">LOG IN</button>
        </div>

        <div class="auth-panel" id="auth-panel-register">
          <div class="auth-field">
            <label class="auth-field__label"
              >Full Name <span class="auth-field__required">*</span></label
            >
            <input class="auth-field__input" id="reg-name" type="text" />
          </div>
          <div class="auth-field">
            <label class="auth-field__label"
              >Email address <span class="auth-field__required">*</span></label
            >
            <input class="auth-field__input" id="reg-email" type="email" />
          </div>
          <div class="auth-field">
            <label class="auth-field__label"
              >Password <span class="auth-field__required">*</span></label
            >
            <div class="auth-field__input-wrap">
              <input
                class="auth-field__input"
                id="reg-password"
                type="password"
              />
              <button class="auth-field__eye" id="reg-eye" type="button">
                <i class="far fa-eye"></i>
              </button>
            </div>
          </div>
          <div class="auth-field">
            <label class="auth-field__label"
              >Confirm Password
              <span class="auth-field__required">*</span></label
            >
            <input class="auth-field__input" id="reg-confirm" type="password" />
          </div>
          <p class="auth-msg" id="reg-msg"></p>
          <button class="auth-btn" id="reg-submit">REGISTER</button>
        </div>
      </div>
    </div>

    <footer class="footer" id="footer-root"></footer>

    <script type="module" defer src="/dist/js/contact.js"></script>
    <script type="module" defer src="/dist/js/main.js"></script>
  </body>
</html>
