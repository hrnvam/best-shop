<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="/dist/css/main.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"
    />
    <title>BEST SHOP</title>
  </head>
  <body>
    <header class="header" id="header-root">
    </header>

    <section class="cart-banner">
      <div class="cart-banner__overlay"></div>
      <h1 class="cart-banner__title">My Cart</h1>
    </section>

    <main class="cart-main">
      <div class="container">
        <div class="cart-empty" id="cart-empty" style="display: none">
          <i class="fas fa-shopping-cart cart-empty__icon"></i>
          <p class="cart-empty__text">Your cart is empty</p>
          <a href="/src/html/catalog.html" class="cart-btn">Browse Catalog</a>
        </div>

        <div class="cart-wrapper" id="cart-wrapper">
          <table class="cart-table" id="cart-table">
            <thead>
              <tr class="cart-table__head-row">
                <th class="cart-table__th">Image</th>
                <th class="cart-table__th">Product Name</th>
                <th class="cart-table__th">Price</th>
                <th class="cart-table__th">Quantity</th>
                <th class="cart-table__th">Total</th>
                <th class="cart-table__th">Delete</th>
              </tr>
            </thead>
            <tbody id="cart-tbody"></tbody>
          </table>

          <div class="cart-footer">
            <div class="cart-actions">
              <a href="/src/html/catalog.html" class="cart-btn"
                >Continue Shopping</a
              >
              <button class="cart-btn" id="clear-cart-btn">
                Clear Shopping Cart
              </button>
            </div>

            <div class="cart-summary">
              <div class="cart-summary__row">
                <span class="cart-summary__label">Sub Total</span>
                <span class="cart-summary__value" id="summary-subtotal"
                  >$0</span
                >
              </div>
              <hr class="cart-summary__divider" />
              <div class="cart-summary__row">
                <span class="cart-summary__label">Shipping</span>
                <span class="cart-summary__value" id="summary-shipping"
                  >$30</span
                >
              </div>
              <hr class="cart-summary__divider" />
              <div
                class="cart-summary__row"
                id="summary-discount-row"
                style="display: none"
              >
                <span class="cart-summary__label">Discount (10%)</span>
                <span class="cart-summary__value" id="summary-discount"
                  >-$0</span
                >
              </div>
              <hr class="cart-summary__divider" />
              <div class="cart-summary__row cart-summary__row--total">
                <span class="cart-summary__label">Total</span>
                <span class="cart-summary__value" id="summary-total">$30</span>
              </div>
              <button class="cart-btn cart-btn--checkout" id="checkout-btn">
                Checkout
              </button>
            </div>
          </div>
        </div>
      </div>
    </main>
    <div class="toast" id="toast">
      <span id="toastMessage">Added to cart!</span>
    </div>

    <div class="auth-modal" id="auth-modal" aria-hidden="true">
      <div class="auth-modal__backdrop" id="auth-modal-backdrop"></div>
      <div class="auth-card" role="dialog" aria-modal="true">
        <button
          class="auth-card__close"
          id="auth-modal-close"
          aria-label="Close"
        >
          <i class="fas fa-times"></i>
        </button>

        <div class="auth-tabs">
          <button
            class="auth-tabs__btn auth-tabs__btn--active"
            data-tab="login"
          >
            Log In
          </button>
          <button class="auth-tabs__btn" data-tab="register">Register</button>
        </div>

        <div class="auth-panel auth-panel--active" id="auth-panel-login">
          <div class="auth-field">
            <label class="auth-field__label"
              >Email address <span class="auth-field__required">*</span></label
            >
            <input class="auth-field__input" id="login-email" type="email" />
          </div>
          <div class="auth-field">
            <label class="auth-field__label"
              >Password <span class="auth-field__required">*</span></label
            >
            <div class="auth-field__input-wrap">
              <input
                class="auth-field__input"
                id="login-password"
                type="password"
              />
              <button class="auth-field__eye" id="login-eye" type="button">
                <i class="far fa-eye"></i>
              </button>
            </div>
          </div>
          <div class="auth-row">
            <label class="auth-check-label">
              <input
                type="checkbox"
                id="login-remember"
                class="auth-checkbox"
              />
              Remember me
            </label>
            <a href="#" class="auth-link">Forgot Your Password?</a>
          </div>
          <p class="auth-msg" id="login-msg"></p>
          <button class="auth-btn" id="login-submit">LOG IN</button>
        </div>

        <div class="auth-panel" id="auth-panel-register">
          <div class="auth-field">
            <label class="auth-field__label"
              >Full Name <span class="auth-field__required">*</span></label
            >
            <input class="auth-field__input" id="reg-name" type="text" />
          </div>
          <div class="auth-field">
            <label class="auth-field__label"
              >Email address <span class="auth-field__required">*</span></label
            >
            <input class="auth-field__input" id="reg-email" type="email" />
          </div>
          <div class="auth-field">
            <label class="auth-field__label"
              >Password <span class="auth-field__required">*</span></label
            >
            <div class="auth-field__input-wrap">
              <input
                class="auth-field__input"
                id="reg-password"
                type="password"
              />
              <button class="auth-field__eye" id="reg-eye" type="button">
                <i class="far fa-eye"></i>
              </button>
            </div>
          </div>
          <div class="auth-field">
            <label class="auth-field__label"
              >Confirm Password
              <span class="auth-field__required">*</span></label
            >
            <input class="auth-field__input" id="reg-confirm" type="password" />
          </div>
          <p class="auth-msg" id="reg-msg"></p>
          <button class="auth-btn" id="reg-submit">REGISTER</button>
        </div>
      </div>
    </div>

    <footer class="footer" id="footer-root">
    </footer>

    <script type="module" defer src="/dist/js/cart.js"></script>
    <script type="module" defer src="/dist/js/main.js"></script>
  </body>
</html>
